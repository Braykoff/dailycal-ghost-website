name: Package Ghost Theme

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: theme/package-lock.json

      - name: Verify release tag matches package.json version
        id: verify
        continue-on-error: true
        run: |
          mkdir -p .release-status
          PKG_VERSION=$(node -p "require('./theme/package.json').version")
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED_TAG="v${PKG_VERSION}"

          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            printf '%s' "Release tag must match format vMAJOR.MINOR.PATCH (e.g. v1.0.0). Got: ${TAG}" > .release-status/verify.error
            exit 1
          fi

          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            printf '%s' "Version mismatch: tag is ${TAG}, package.json is ${PKG_VERSION} (expected ${EXPECTED_TAG})" > .release-status/verify.error
            exit 1
          fi

      - name: Install dependencies
        if: steps.verify.outcome == 'success'
        working-directory: theme
        run: npm ci

      - name: Build theme assets
        id: build
        if: steps.verify.outcome == 'success'
        working-directory: theme
        run: |
          mkdir -p ../.release-status
          npm run build

      - name: Validate theme with GScan
        id: gscan
        if: steps.verify.outcome == 'success' && steps.build.outcome == 'success'
        working-directory: theme
        run: |
          mkdir -p ../.release-status

          if ! npx gscan . 2> ../.release-status/gscan.log; then
            ERROR=$(tail -n 3 ../.release-status/gscan.log | tr '\n' ' ' | sed 's/  */ /g' | cut -c1-240)
            if [ -z "$ERROR" ]; then
              ERROR="GScan reported theme compatibility errors"
            fi
            printf '%s' "$ERROR" > ../.release-status/gscan.error
            exit 1
          fi

      - name: Create theme zip
        id: zip
        if: >-
          steps.verify.outcome == 'success' &&
          steps.build.outcome == 'success' &&
          steps.gscan.outcome == 'success'
        working-directory: theme
        run: |
          mkdir -p ../.release-status

          if ! npx gulp zip; then
            printf '%s' "Gulp zip task failed (see Actions log)" > ../.release-status/zip.error
            exit 1
          fi

          if ! compgen -G "../dc-theme-*.zip" > /dev/null; then
            printf '%s' "Gulp finished but no dc-theme-*.zip file was found" > ../.release-status/zip.error
            exit 1
          fi

      - name: Upload release asset
        if: >-
          steps.verify.outcome == 'success' &&
          steps.build.outcome == 'success' &&
          steps.gscan.outcome == 'success' &&
          steps.zip.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: dc-theme-*.zip

      - name: Append packaging status to release notes
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          GSCAN_OUTCOME: ${{ steps.gscan.outcome }}
          ZIP_OUTCOME: ${{ steps.zip.outcome }}
        run: |
          python3 <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          marker = "<!-- theme-release-status -->"
          status_dir = Path(".release-status")

          verify_outcome = os.environ["VERIFY_OUTCOME"]
          build_outcome = os.environ["BUILD_OUTCOME"]
          gscan_outcome = os.environ["GSCAN_OUTCOME"]
          zip_outcome = os.environ["ZIP_OUTCOME"]

          def read_error(name: str) -> str:
              path = status_dir / f"{name}.error"
              return path.read_text(encoding="utf-8").strip() if path.exists() else ""

          def format_line(outcome: str, label: str, error_key: str, skip_reason: str) -> str:
              if outcome == "success":
                  return f"✅ {label}"
              if outcome == "failure":
                  detail = read_error(error_key)
                  suffix = f" — {detail}" if detail else ""
                  return f"❌ {label}{suffix}"
              return f"⚪ {label} — {skip_reason}"

          verify_failed = verify_outcome != "success"
          build_failed = build_outcome != "success"
          gscan_failed = gscan_outcome != "success"

          gscan_skip = "Skipped because a previous step failed"
          if verify_failed:
              gscan_skip = "Skipped because release tag and package.json version did not match"
          elif build_failed:
              gscan_skip = "Skipped because theme build failed"

          zip_skip = "Skipped because a previous step failed"
          if verify_failed:
              zip_skip = "Skipped because release tag and package.json version did not match"
          elif build_failed:
              zip_skip = "Skipped because theme build failed"
          elif gscan_failed:
              zip_skip = "Skipped because GScan did not pass"

          checks = [
              format_line(
                  verify_outcome,
                  "Release tag and package.json version match",
                  "verify",
                  "Skipped because a previous step failed",
              ),
              format_line(
                  gscan_outcome,
                  "GScan success",
                  "gscan",
                  gscan_skip,
              ),
              format_line(
                  zip_outcome,
                  "Generated theme zip",
                  "zip",
                  zip_skip,
              ),
          ]

          status_text = "\n".join(checks)
          status_block = f"{marker}\n\n```\n{status_text}\n```"

          tag = os.environ["RELEASE_TAG"]
          result = subprocess.run(
              ["gh", "release", "view", tag, "--json", "body", "-q", ".body"],
              capture_output=True,
              text=True,
              check=True,
          )
          body = result.stdout.rstrip()
          body = re.sub(re.escape(marker) + r".*?```", "", body, flags=re.DOTALL).rstrip()
          new_body = f"{body}\n\n{status_block}" if body else status_block

          subprocess.run(
              ["gh", "release", "edit", tag, "--notes", new_body],
              check=True,
          )
          PY

      - name: Fail if packaging was incomplete
        if: >-
          always() && (
            steps.verify.outcome != 'success' ||
            steps.gscan.outcome != 'success' ||
            steps.zip.outcome != 'success'
          )
        run: exit 1
