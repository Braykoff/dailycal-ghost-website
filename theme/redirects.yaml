# Edit this file directly. It is not generated by the sections build.

# Permanent redirects
301:
  # Keep uncategorized post permalinks, but do not expose their collection index.
  ^/article/?$: /

  # RSS lives under the /article/ catch-all collection.
  ^/rss/: /article/rss/

  # Replace one legacy underscore with a hyphen per request. 
  # Repeated requests normalize any number of underscores.
  # Leaves article_*.html and /_/ alone for later matching.
  ^/(?!_/)(.*?)_(?![^/]*\.html)(.*)$: /$1-$2

  # Legacy BLOX URLs: keep the full category path + slug, drop the
  # trailing bogus `article_*.html`,
  ^/(.*/)?([^/]+)/article_[^/]+\.html$: /$1$2/

  # Unwrap hidden /_/… collection indexes to their public paths (any depth).
  ^/_/(.*?)/?$: /$1/
